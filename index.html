<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>EF2 Fossil Excavation — solver</title>
<link rel="stylesheet" href="styles.css" />
</head>
<body>
<div class="wrap">
  <div class="topbar">
    <h1>EF2 Fossil Excavation — solver</h1>
    <button id="btnTheme" class="icon ghost" title="Toggle dark mode" aria-label="Toggle dark mode">🌙</button>
  </div>
  <p class="sub">Reads the exact board straight from the running game and shows the fewest-swing way to uncover every fossil. Fully offline and read-only.</p>
  <div id="app"></div>
</div>

<script>
  // Always load fresh JS. This is a local, no-build tool served by a plain HTTP
  // server with no cache headers; a stale-cached script after an edit is far more
  // confusing than re-fetching a couple of tiny files, so cache-bust every load.
  (function () {
    var v = Date.now();
    ['solver.js', 'metrics.js', 'live.js', 'app.js'].forEach(function (s) {
      document.write('<script src="' + s + '?v=' + v + '"><\/script>');
    });
  })();
</script>
</body>
</html>
