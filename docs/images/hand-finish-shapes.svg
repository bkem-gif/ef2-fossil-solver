<svg viewBox="0 0 960 440" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, 'Helvetica Neue', Arial, sans-serif">
  <text x="480" y="44" text-anchor="middle" font-size="27" font-weight="700" fill="#3a2c12">Finishing a fossil — aim the splash at its own tiles</text>
  <text x="480" y="70" text-anchor="middle" font-size="16" fill="#6a5a3a">① ② ③ ④ = the order you swing.  All tiles HP 3 → 4 swings either way.</text>

  <!-- ===== LINE panel ===== -->
  <text x="70" y="120" font-size="20" font-weight="700" fill="#2f6d1f">LINE (1×4)</text>
  <g>
    <!-- t1 t2 t3 t4 ; hit order 3 1 2 4 -->
    <rect x="70"  y="148" width="78" height="78" rx="10" fill="#bfe08a" stroke="#8fb95f" stroke-width="2.5"/>
    <rect x="156" y="148" width="78" height="78" rx="10" fill="#bfe08a" stroke="#e24b4a" stroke-width="4.5"/>
    <rect x="242" y="148" width="78" height="78" rx="10" fill="#bfe08a" stroke="#8fb95f" stroke-width="2.5"/>
    <rect x="328" y="148" width="78" height="78" rx="10" fill="#bfe08a" stroke="#8fb95f" stroke-width="2.5"/>
    <text x="76"  y="168" font-size="13" fill="#6f9152">3</text>
    <text x="162" y="168" font-size="13" fill="#6f9152">3</text>
    <text x="248" y="168" font-size="13" fill="#6f9152">3</text>
    <text x="334" y="168" font-size="13" fill="#6f9152">3</text>
    <g font-size="22" font-weight="800" text-anchor="middle">
      <circle cx="109" cy="187" r="19" fill="#ffffff" stroke="#2f6d1f" stroke-width="2.5"/><text x="109" y="195" fill="#2f6d1f">3</text>
      <circle cx="195" cy="187" r="19" fill="#ffffff" stroke="#e24b4a" stroke-width="2.5"/><text x="195" y="195" fill="#e24b4a">1</text>
      <circle cx="281" cy="187" r="19" fill="#ffffff" stroke="#2f6d1f" stroke-width="2.5"/><text x="281" y="195" fill="#2f6d1f">2</text>
      <circle cx="367" cy="187" r="19" fill="#ffffff" stroke="#2f6d1f" stroke-width="2.5"/><text x="367" y="195" fill="#2f6d1f">4</text>
    </g>
  </g>

  <!-- ===== SQUARE panel ===== -->
  <text x="600" y="120" font-size="20" font-weight="700" fill="#2f6d1f">SQUARE (2×2)</text>
  <g>
    <!-- TL TR / BL BR ; hit order 1 3 / 2 4 -->
    <rect x="600" y="148" width="78" height="78" rx="10" fill="#bfe08a" stroke="#e24b4a" stroke-width="4.5"/>
    <rect x="686" y="148" width="78" height="78" rx="10" fill="#bfe08a" stroke="#8fb95f" stroke-width="2.5"/>
    <rect x="600" y="234" width="78" height="78" rx="10" fill="#bfe08a" stroke="#8fb95f" stroke-width="2.5"/>
    <rect x="686" y="234" width="78" height="78" rx="10" fill="#bfe08a" stroke="#8fb95f" stroke-width="2.5"/>
    <text x="606" y="168" font-size="13" fill="#6f9152">3</text>
    <text x="692" y="168" font-size="13" fill="#6f9152">3</text>
    <text x="606" y="254" font-size="13" fill="#6f9152">3</text>
    <text x="692" y="254" font-size="13" fill="#6f9152">3</text>
    <g font-size="22" font-weight="800" text-anchor="middle">
      <circle cx="639" cy="187" r="19" fill="#ffffff" stroke="#e24b4a" stroke-width="2.5"/><text x="639" y="195" fill="#e24b4a">1</text>
      <circle cx="725" cy="187" r="19" fill="#ffffff" stroke="#2f6d1f" stroke-width="2.5"/><text x="725" y="195" fill="#2f6d1f">3</text>
      <circle cx="639" cy="273" r="19" fill="#ffffff" stroke="#2f6d1f" stroke-width="2.5"/><text x="639" y="281" fill="#2f6d1f">2</text>
      <circle cx="725" cy="273" r="19" fill="#ffffff" stroke="#2f6d1f" stroke-width="2.5"/><text x="725" y="281" fill="#2f6d1f">4</text>
    </g>
  </g>

  <text x="70" y="362" font-size="17" fill="#4a3c22">LINE: tap the two inside tiles first — each +1 pre-chips a neighbour, so the ends fall in one tap.</text>
  <text x="70" y="390" font-size="17" fill="#4a3c22">SQUARE: every hit is a corner — its +1 stays inside, chipping two siblings each time.</text>
</svg>
